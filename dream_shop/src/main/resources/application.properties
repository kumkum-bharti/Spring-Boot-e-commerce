spring.application.name=dream_shop

spring.datasource.url=jdbc:mysql://localhost:3306/dream_shops
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#create-create from scratch,update-not from scratch , create-drop-create when project starts and drops when project ends,validate-production
#update store the work done on database so far
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.ma  x-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.prefix=/api/v1
